<html>
    <head>
    <style>
        table,th,tr,td{
            border: 1px solid black;
            border-collapse: separate;
        }
    </style>        
    </head>
    <body>
        <table>
            <caption>Assignment 2-Table</caption>
                <tr>
                    <td>Item</td>
                    <th>Quantity</th>
                    <th>Unit Price</th>
                    <th>Price</th>
                </tr>        
        <tbody>
            <tr>
                <td>Pencils</td>
                <td>2</td>
                <td>$1</td>
                <td>$2</td>
            </tr>
            <tr>
                <td>Erasers</td>
                <td>4</td>
                <td rowspan="2">$0.50</td>
                <td>$2</td>
            </tr>
            <tr >
                <td colspan="2">Subtotal</td>
                <td>$2</td>
            </tr>
            <tr>
                <td>Tax</td>
                <td>10%</td>
                <td colspan="4">$0.4</td>
            </tr>
        </tbody>
        <tr>
              <td colspan="4">Footer of the table</td> 
          </tr>
        
    </table>
    </body>
</html>
